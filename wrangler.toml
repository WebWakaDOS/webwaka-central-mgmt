name = "webwaka-central-mgmt"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "webwaka-central-mgmt-db-prod"
database_id = "847400fd-41b1-474e-b822-bd33cff433a9"
migrations_dir = "migrations"

# ─── KV Namespace ─────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "PLATFORM_KV"
id = "4dc91c49d36047f09f99084e0446b837"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-central-mgmt-production"
[env.production.vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put <KEY> --env production)
# JWT_SECRET
# INTER_SERVICE_SECRET

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-central-mgmt-db-prod"
database_id = "847400fd-41b1-474e-b822-bd33cff433a9"

[[env.production.kv_namespaces]]
binding = "PLATFORM_KV"
id = "4dc91c49d36047f09f99084e0446b837"

