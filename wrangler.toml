# webwaka-central-mgmt — Cloudflare Workers configuration
# Shared 2-DB model: webwaka-production-db + webwaka-staging-db
# Table prefix: cmgt_

name = "webwaka-central-mgmt"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespace ─────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "PLATFORM_KV"
id = "4dc91c49d36047f09f99084e0446b837"

# ── Production Environment ──────────────────────────────────────────────────
[env.production]
name = "webwaka-central-mgmt-production"
[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db"
database_id = "d01940d3-d69e-4455-94ba-bc2404cb3872"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "PLATFORM_KV"
id = "4dc91c49d36047f09f99084e0446b837"

# ── Staging Environment ─────────────────────────────────────────────────────
[env.staging]
name = "webwaka-central-mgmt-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-staging-db"
database_id = "d7278ca0-2408-40d5-a08b-d8456601f667"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "PLATFORM_KV"
id = "4dc91c49d36047f09f99084e0446b837"
